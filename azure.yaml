# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: real-time-intelligence-operations-solution-accelerator
metadata:
  template: real-time-intelligence-operations-solution-accelerator@1.0

requiredVersions:
  azd: ">= 1.19.0 != 1.23.9"

hooks:
  preprovision:
    windows:
      run: |
        Write-Host ""
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host "  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs." -ForegroundColor Yellow
        Write-Host "  https://github.com/microsoft/real-time-intelligence-operations-solution-accelerator/issues" -ForegroundColor Cyan
        Write-Host "  ---------------------------------------------------------------------------------------------------" -ForegroundColor Yellow
        Write-Host ""
      shell: pwsh
      interactive: true
    posix:
      run: |
        printf '\n'
        printf '\033[33m  ---------------------------------------------------------------------------------------------------\033[0m\n'
        printf '\033[33m  Note: If deployment fails or you encounter an issue, please open an issue with the deployment logs.\033[0m\n'
        printf '\033[36m  https://github.com/microsoft/real-time-intelligence-operations-solution-accelerator/issues\033[0m\n'
        printf '\033[33m  ---------------------------------------------------------------------------------------------------\033[0m\n'
        printf '\n'
      shell: sh
      interactive: true
  postprovision:
    windows:
      shell: pwsh
      run: ./infra/scripts/utils/Run-PythonScript.ps1 -ScriptPath "infra/scripts/fabric/deploy_fabric_rti.py"
      interactive: true
      continueOnError: false
    posix:
      shell: pwsh
      run: ./infra/scripts/utils/Run-PythonScript.ps1 -ScriptPath "infra/scripts/fabric/deploy_fabric_rti.py" -SkipPythonVirtualEnvironment
      interactive: true
      continueOnError: false
  predown:
    windows:
      shell: pwsh
      run: ./infra/scripts/utils/Run-PythonScript.ps1 -ScriptPath "infra/scripts/fabric/delete_fabric_rti.py"
      interactive: true
      continueOnError: false
    posix:
      shell: pwsh
      run: ./infra/scripts/utils/Run-PythonScript.ps1 -ScriptPath "infra/scripts/fabric/delete_fabric_rti.py" -SkipPythonVirtualEnvironment
      interactive: true
      continueOnError: false
